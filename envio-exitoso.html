<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Envío Exitoso</title>
    
    <!-- ✅ Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- ✅ Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- ✅ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- ✅ CSS Personalizado -->
    <link rel="stylesheet" href="css/envio-exitoso.css" />
</head>
<body>
    <!-- ============================================ -->
    <!-- MAIN CONTENT                                -->
    <!-- ============================================ -->
    <main class="flex-grow flex items-center justify-center relative px-container-mobile py-stack-lg min-h-screen">
        
        <!-- Dimmed Background Overlay -->
        <div class="absolute inset-0 opacity-20 pointer-events-none overflow-hidden"></div>
        
        <!-- Notification Card -->
        <div class="relative z-10 w-full max-w-sm rounded-xl p-8">
            <div class="flex flex-col items-center text-center">
                
                <!-- Success Icon Wrapper -->
                <div class="w-24 h-24 bg-secondary-container/10 rounded-full flex items-center justify-center mb-stack-lg">
                    <span class="material-symbols-outlined text-secondary scale-[2.5]" style="font-variation-settings: 'FILL' 1;">
                        check_circle
                    </span>
                </div>
                
                <!-- Headline -->
                <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-md">
                    ¡Envío Exitoso!
                </h2>
                
                <!-- Description -->
                <p class="font-body-lg text-body-lg text-on-surface-variant mb-10 leading-relaxed">
                    Tu reporte ha sido enviado correctamente. Nuestro equipo lo revisará pronto y tomará las acciones necesarias.
                </p>
                
                <!-- Primary Action Button -->
                <a class="w-full text-on-primary py-4 px-6 rounded-lg font-semibold text-center transition-all duration-200 active:scale-95 hover:opacity-90" 
                   href="principal.html" 
                   id="btn-volver-inicio"
                   style="background-color: rgb(0, 102, 204);">
                    Volver al Inicio
                </a>
                
            </div>
        </div>
        
    </main>

    <!-- ✅ JavaScript -->
    <script src="js/envio-exitoso.js"></script>
</body>
</html>
