<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CIMHA - Centro de Inteligencia Meterorologica Hidrologica y Ambiental </title>
    
    <!-- ✅ Tailwind CSS (si lo usas) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ✅ Tu CSS personalizado -->
    <link rel="stylesheet" href="css/index.css" />
</head>
<body>
    <!-- ============================================ -->
    <!-- MAIN CONTENT                                -->
    <!-- ============================================ -->
    <main>
        <!-- Center Logo Section -->
        <div 
            class="relative flex items-center justify-center w-full max-w-xs opacity-0" 
            id="logo-container"
        >
            <div class="relative z-10">
                <img 
                    alt="CIMHA Logo" 
                    class="w-48 h-48 object-contain" 
                    src="assets/cimha-logo.webp"
                    width="192" 
                    height="192" 
                    loading="eager"
                    fetchpriority="high"
                    decoding="async"
                />
            </div>
        </div>
    </main>

    <!-- ✅ JavaScript -->
    <script src="js/index.js"></script>
